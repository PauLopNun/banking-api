services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bankingdb
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USERNAME: banking
      DB_PASSWORD: banking123
    depends_on:
      - db

volumes:
  postgres_data: